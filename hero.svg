<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="thechifura — Quantitative ML and RL engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="50%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="namegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="signalfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.55"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <ellipse cx="980" cy="180" rx="380" ry="240" fill="url(#glow)"/>

  <!-- Animated scanline -->
  <rect x="0" y="0" width="1280" height="2" fill="#22d3ee" opacity="0.18">
    <animate attributeName="y" values="0;360;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Top-left "system" status pill -->
  <g transform="translate(60, 50)" font-family="ui-monospace, 'SF Mono', Consolas, 'Cascadia Code', monospace">
    <rect width="220" height="28" rx="14" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#22d3ee">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="18" font-size="11" fill="#22d3ee" letter-spacing="1.5">SYSTEM // ONLINE  ·  v2026.05</text>
  </g>

  <!-- Top-right code coords -->
  <g transform="translate(1100, 50)" font-family="ui-monospace, 'SF Mono', Consolas, monospace">
    <text x="0" y="18" font-size="11" fill="#475569" letter-spacing="1.2">N -17.829° E 31.054°</text>
  </g>

  <g font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif">
    <!-- Glyph mark: monogram VC -->
    <g transform="translate(60, 116)">
      <rect x="0" y="0" width="68" height="68" rx="14" fill="none" stroke="url(#cyan)" stroke-width="2"/>
      <text x="34" y="48" font-size="34" font-weight="800" fill="url(#namegrad)" text-anchor="middle" letter-spacing="-1">TC</text>
      <!-- corner ticks -->
      <path d="M 0 8 L 0 0 L 8 0" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M 60 0 L 68 0 L 68 8" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M 68 60 L 68 68 L 60 68" fill="none" stroke="#a78bfa" stroke-width="2"/>
      <path d="M 8 68 L 0 68 L 0 60" fill="none" stroke="#a78bfa" stroke-width="2"/>
    </g>

    <!-- Hello / handle -->
    <text x="148" y="138" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="13" fill="#64748b" letter-spacing="2.5">$ whoami --verbose</text>

    <!-- Name -->
    <text x="148" y="195" font-size="64" font-weight="800" fill="url(#namegrad)" letter-spacing="-1.5" filter="url(#neon)">
      THECHIFURA
    </text>

    <!-- Role line -->
    <text x="148" y="228" font-size="20" font-weight="600" fill="#e2e8f0" letter-spacing="0.4">
      Quantitative <tspan fill="#22d3ee">ML</tspan> &#215; <tspan fill="#a78bfa">RL</tspan> Engineer  ·  builder of the layer underneath your strategy
    </text>

    <!-- Pill row -->
    <g transform="translate(148, 252)" font-family="ui-monospace, 'SF Mono', Consolas, monospace">
      <g>
        <rect width="170" height="30" rx="15" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.55"/>
        <text x="85" y="20" font-size="12" font-weight="600" fill="#22d3ee" text-anchor="middle">QUANTFLOW · v0.1</text>
      </g>
      <g transform="translate(182, 0)">
        <rect width="156" height="30" rx="15" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.55"/>
        <text x="78" y="20" font-size="12" font-weight="600" fill="#38bdf8" text-anchor="middle">PYTORCH · GYM · RAY</text>
      </g>
      <g transform="translate(350, 0)">
        <rect width="180" height="30" rx="15" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.55"/>
        <text x="90" y="20" font-size="12" font-weight="600" fill="#a78bfa" text-anchor="middle">FOR HIRE · OPEN-SOURCE</text>
      </g>
    </g>

    <!-- footer ID line -->
    <text x="148" y="316" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11" fill="#475569" letter-spacing="2.4">
      HANDLE: @thechifura  ·  STACK: PYTHON · TS · RUST  ·  EMAIL: louischifura@gmail.com
    </text>
  </g>

  <!-- RIGHT: animated "live signal" panel -->
  <g transform="translate(760, 96)">
    <!-- frame -->
    <rect x="0" y="0" width="460" height="200" rx="12" fill="#070a14" stroke="#1e293b"/>
    <!-- header strip -->
    <rect x="0" y="0" width="460" height="28" rx="12" fill="#0f172a"/>
    <rect x="0" y="20" width="460" height="8" fill="#0f172a"/>
    <g font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="11">
      <circle cx="14" cy="14" r="4" fill="#ef4444"/>
      <circle cx="28" cy="14" r="4" fill="#fbbf24"/>
      <circle cx="42" cy="14" r="4" fill="#22d3ee"/>
      <text x="60" y="18" fill="#64748b">~/quantflow/live_signal.py</text>
      <rect x="380" y="6" width="68" height="16" rx="8" fill="#022c22" stroke="#34d399" stroke-opacity="0.6"/>
      <text x="414" y="17" fill="#34d399" text-anchor="middle">LIVE</text>
    </g>

    <!-- Filled area under signal -->
    <path d="M 20 140 L 50 130 L 80 145 L 110 110 L 140 100 L 170 120 L 200 80 L 230 70
             L 260 95 L 290 60 L 320 50 L 350 70 L 380 40 L 410 35 L 440 50
             L 440 180 L 20 180 Z"
          fill="url(#signalfill)"/>

    <!-- Main signal line -->
    <path d="M 20 140 L 50 130 L 80 145 L 110 110 L 140 100 L 170 120 L 200 80 L 230 70
             L 260 95 L 290 60 L 320 50 L 350 70 L 380 40 L 410 35 L 440 50"
          fill="none" stroke="url(#cyan)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="800" stroke-dashoffset="800">
      <animate attributeName="stroke-dashoffset" from="800" to="0" dur="2.4s" fill="freeze"/>
    </path>

    <!-- Secondary dashed signal -->
    <path d="M 20 155 L 80 140 L 140 110 L 200 100 L 260 105 L 320 80 L 380 70 L 440 65"
          fill="none" stroke="#a78bfa" stroke-opacity="0.65" stroke-width="1.8"
          stroke-dasharray="3 5" stroke-linecap="round"/>

    <!-- Animated cursor dot -->
    <circle r="5" fill="#22d3ee">
      <animateMotion dur="6s" repeatCount="indefinite"
                     path="M 20 140 L 50 130 L 80 145 L 110 110 L 140 100 L 170 120 L 200 80 L 230 70 L 260 95 L 290 60 L 320 50 L 350 70 L 380 40 L 410 35 L 440 50"/>
      <animate attributeName="r" values="3;6;3" dur="1.4s" repeatCount="indefinite"/>
    </circle>

    <!-- side metric strips -->
    <g font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="10">
      <text x="20" y="195" fill="#475569">SHARPE: <tspan fill="#22d3ee">1.84</tspan></text>
      <text x="120" y="195" fill="#475569">DD: <tspan fill="#f0abfc">-7.2%</tspan></text>
      <text x="200" y="195" fill="#475569">VOL: <tspan fill="#a78bfa">12.3%</tspan></text>
      <text x="290" y="195" fill="#475569">REGIME: <tspan fill="#34d399">CALM</tspan></text>
    </g>
  </g>

  <!-- Bottom hairline accent -->
  <rect x="0" y="358" width="1280" height="2" fill="url(#cyan)" opacity="0.55"/>
</svg>
